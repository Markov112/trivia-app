<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Trivia Quiz App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-white">

<div class="container py-5">

  <h1 class="mb-4 text-center">🧠 Trivia Quiz</h1>

  <div id="start-screen" class="text-center">
    <button id="start-btn" class="btn btn-primary btn-lg">Start Quiz</button>
  </div>

  <div id="quiz-screen" class="d-none">

    <h3 id="question"></h3>

    <div id="answers" class="mt-3"></div>

    <p class="mt-3">Score: <span id="score">0</span></p>
  </div>

  <div id="end-screen" class="d-none text-center">
    <h2>Game Over 🎉</h2>
    <p>Your score: <span id="final-score"></span></p>
    <button id="restart-btn" class="btn btn-success">Play again</button>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="app.js"></script>

</body>
</html>
