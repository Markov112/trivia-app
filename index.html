<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Trivia Quiz</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container py-5 text-center">

  <h1 class="mb-4">🧠 Trivia Quizaza</h1>

  <div id="start-screen">
    <button id="start-btn" class="btn btn-primary btn-lg">Start Quiz</button>
  </div>

  <div id="quiz-screen" class="d-none">
    <h3 id="question"></h3>

    <div id="answers" class="mt-4"></div>

    <h5 class="mt-4">Score: <span id="score">0</span></h5>
  </div>

  <div id="end-screen" class="d-none">
    <h2>Game Over 🎉</h2>
    <h3>Your score: <span id="final-score"></span></h3>
    <button id="restart-btn" class="btn btn-success mt-3">Play again</button>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="app.js"></script>

</body>
</html>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="app.js"></script>

</body>
</html>
